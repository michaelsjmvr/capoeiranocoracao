<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');

        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        header{
            width: 100%;
            height: 120px;
            background-color: #333;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 30px;
        }
        header figure img{
            width: 130px;
            height: 130px;
        }
        header nav ul a{
            color: white;
            text-decoration: none;
            margin: 0px 6px;
            transition: color 0.6s ease; /* Animação da cor */
            font-family: "Roboto", system-ui;
            font-weight: 500;
            font-style: normal;
        }
        header nav ul a:hover{
            color: #EFB432;
        }
        header nav ul .active{
            color: #EFB432;
        }
        main{
            width: 100%;
            height: 73.6dvh;
            background-image: url(/src/img/background-2.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: left;
            align-items: center;
        }
        main .container{
            margin-left: 10%;
            background-color: transparent;
            padding: 30px;
            border-radius: 3px;
            width: 400px;
        }
        main .container h2{
            font-size: 2rem;
            font-family: "Roboto", system-ui;
            font-weight: 500;
            font-style: normal;
            color: #EFB432;
            text-shadow: 2px 2px 4px rgba(36, 36, 36, 0.815);
        }
        main .container p{
            font-size: 1rem;
            font-family: "Roboto", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(233, 233, 233);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            text-align: justify
        }
        footer{
            width: 100%;
            height: 40px;
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 12px;
        }
        footer p{
            color: white;
            font-family: "Roboto", system-ui;
            font-weight: 400;
            font-style: normal;
        }
        @media (min-width: 1400px) {
            main{
                height: 82.6dvh;
            }
        }
        @media (min-width: 1200px) and (max-width: 1399px) {}
        @media (max-width: 1199px) {}

    </style>
    <link rel="shortcut icon" href="/src/img/logo4.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capoeira no Coração</title>
</head>
<body>
    <header>
        <figure>
            <img src="/src/img/logo4.png" alt="Logo da Capoeira no Coração">
        </figure>
        <nav>
            <ul>
                <a href="#" class="active">Inicio</a>
                <a href="#">Sobre</a>
                <a href="#">Imagens</a>
                <a href="#">Eventos</a>
                <a href="#">Tutoriais</a>
                <a href="#">Contato</a>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h2>No Ritmo da Capoeira</h2>
            <p>Aqui, a alma dança, o corpo luta e o coração vibra ao som do berimbau. Junte-se a nós nessa jornada de força, cultura e união.</p>
        </div>
    </main>
    <footer>
        <p>Capoeira no Coração (CNC)</p>
        <p>Todos os direitos reservados</p>
        <p>Desenvolvido por Michael Douglas (Ipê)</p>
    </footer>
</body>
</html>
